<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Nihongo Sensei — Learn Japanese</title>
    <meta name="description" content="Chat, learn kana & kanji, and test yourself for the JLPT — pick your vibe." />
    <meta name="theme-color" content="#5B8A5C" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <style>
      /* Reset so the app shell fills the exact visible screen on every device.
         100dvh (dynamic viewport height) accounts for mobile browser chrome
         (address bar, bottom nav) — falls back to 100vh on older browsers.
         Without this, 100vh on iOS Safari overflows behind the toolbar. */
      *, *::before, *::after { box-sizing: border-box; }
      html { height: 100%; height: 100dvh; }
      body {
        margin: 0; padding: 0;
        height: 100%; height: 100dvh;
        overflow: hidden;
        -webkit-text-size-adjust: 100%; /* prevent iOS font scaling on rotate */
      }
      #root {
        height: 100%; height: 100dvh;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
